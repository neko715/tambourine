<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🥁 タンバリン</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

:root {
  --wood-a: #c07838;
  --wood-b: #7a3c18;
  --wood-c: #3e1a08;
  --wood-edge: #1a0a04;
  --gold: #d4a83c;
  --silver: #c8c8b8;
  --skin: #e8d098;
  --bg: #0e0806;
  --text: #f0e0c0;
  --accent-tan: #ffd060;
  --accent-shaka: #80d8ff;
}

html, body {
  width: 100%; height: 100dvh;
  overflow: hidden;
}

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, #2a1208 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 100%, #180a04 0%, transparent 50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 20px;
  font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', sans-serif;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  pointer-events: none;
  flex-shrink: 0;
}

h1 {
  font-size: clamp(13px, 3.5vw, 20px);
  font-weight: 900;
  letter-spacing: 0.35em;
  color: var(--text);
  opacity: 0.85;
  text-transform: uppercase;
  padding-left: 0.35em;
}

#motion-status {
  font-size: 10px;
  color: var(--gold);
  opacity: 0.65;
  letter-spacing: 0.08em;
}

/* ── Tambourine wrapper ─────────────────────────────────── */
#tb-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  perspective: 600px;
}

#tb-inner {
  transition: transform 0.08s ease-out;
  transform-style: preserve-3d;
}

/* ── Main tambourine ────────────────────────────────────── */
#tambourine {
  --sz: min(78vw, calc(100dvh - 200px), 420px);
  width: var(--sz);
  height: var(--sz);
  border-radius: 50%;
  position: relative;

  /* Conic wood grain */
  background:
    conic-gradient(
      from 5deg at 50% 50%,
      #9a5428 0deg,  #c07838 7deg,  #a06030 14deg, #7a3c18 21deg,
      #8a4820 28deg, #b86c30 35deg, #a05828 42deg, #6e3618 49deg,
      #9a5428 56deg, #c07838 63deg, #a06030 70deg, #7a3c18 77deg,
      #8a4820 84deg, #b86c30 91deg, #a05828 98deg, #6e3618 105deg,
      #9a5428 112deg,#c07838 119deg,#a06030 126deg,#7a3c18 133deg,
      #8a4820 140deg,#b86c30 147deg,#a05828 154deg,#6e3618 161deg,
      #9a5428 168deg,#c07838 175deg,#a06030 182deg,#7a3c18 189deg,
      #8a4820 196deg,#b86c30 203deg,#a05828 210deg,#6e3618 217deg,
      #9a5428 224deg,#c07838 231deg,#a06030 238deg,#7a3c18 245deg,
      #8a4820 252deg,#b86c30 259deg,#a05828 266deg,#6e3618 273deg,
      #9a5428 280deg,#c07838 287deg,#a06030 294deg,#7a3c18 301deg,
      #8a4820 308deg,#b86c30 315deg,#a05828 322deg,#6e3618 329deg,
      #9a5428 336deg,#c07838 343deg,#a06030 350deg,#7a3c18 357deg,
      #9a5428 360deg
    );

  box-shadow:
    0 0 0 5px #1a0a04,
    0 0 0 9px #2c1208,
    0 28px 80px rgba(0,0,0,0.9),
    0 8px 30px rgba(0,0,0,0.6),
    inset 0 6px 18px rgba(255,200,120,0.12),
    inset 0 -6px 18px rgba(0,0,0,0.35);

  /* Wood grain overlay */
  filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
}

/* Rim highlight ring */
#tambourine::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 28%,
    rgba(255,220,140,0.18) 0%,
    transparent 55%
  );
  pointer-events: none;
  z-index: 3;
}

/* Inner bevel */
#tambourine::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  inset: 16.5%;
  box-shadow:
    0 0 0 2px rgba(0,0,0,0.7),
    0 0 0 4px rgba(255,180,80,0.08),
    inset 0 2px 6px rgba(0,0,0,0.4);
  pointer-events: none;
  z-index: 3;
}

/* ── Membrane ───────────────────────────────────────────── */
#membrane {
  position: absolute;
  inset: 18%;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;
  z-index: 2;

  background:
    radial-gradient(circle at 38% 32%,
      #f8eed8 0%, #ecd898 20%,
      #dcc07a 45%, #c8a85c 68%,
      #b09040 85%, #987830 100%
    );

  box-shadow:
    inset 0 4px 14px rgba(0,0,0,0.4),
    inset 0 -3px 8px rgba(255,255,255,0.12),
    0 0 0 2px rgba(0,0,0,0.6);
}

/* Membrane skin texture */
#membrane::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    repeating-radial-gradient(
      circle at 50% 50%,
      transparent 0px,
      transparent 22px,
      rgba(0,0,0,0.025) 22px,
      rgba(0,0,0,0.025) 23px
    );
  pointer-events: none;
}

/* Membrane sheen */
#membrane::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(ellipse 55% 40% at 30% 25%,
      rgba(255,255,255,0.12) 0%, transparent 60%
    ),
    radial-gradient(ellipse 30% 20% at 70% 70%,
      rgba(0,0,0,0.08) 0%, transparent 50%
    );
  pointer-events: none;
}

/* ── Ripple ─────────────────────────────────────────────── */
.ripple {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  animation: ripple-expand 0.5s ease-out forwards;
}

@keyframes ripple-expand {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.9; }
  100% { transform: translate(-50%,-50%) scale(18); opacity: 0; }
}

.ripple-ring {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(255,240,200,0.5);
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  animation: ring-expand 0.6s ease-out 0.05s forwards;
}

@keyframes ring-expand {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.7; }
  100% { transform: translate(-50%,-50%) scale(15); opacity: 0; }
}

/* ── Jingle slots ───────────────────────────────────────── */
.jingle-group {
  position: absolute;
  z-index: 4;
  transform-origin: center center;
}

.jingle-slot {
  width: 20px;
  height: 30px;
  border-radius: 3px 3px 4px 4px;
  background: linear-gradient(180deg, #1e0c06 0%, #2e1408 50%, #1e0c06 100%);
  border: 1px solid #0e0604;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.8),
    inset 0 -1px 2px rgba(255,150,60,0.06),
    0 1px 3px rgba(0,0,0,0.5);
  transform-origin: center bottom;
}

.jingle-disc {
  width: 16px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.jingle-disc:nth-child(1) {
  background: linear-gradient(135deg,
    #e0ddd2 0%, #b0a898 25%,
    #d0cdc2 50%, #888078 75%,
    #c0bdb2 100%
  );
  border: 0.5px solid #686058;
  box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 0.5px 1px rgba(255,255,255,0.3);
}

.jingle-disc:nth-child(2) {
  background: linear-gradient(135deg,
    #dfc060 0%, #b89030 30%,
    #d8b850 55%, #906820 80%,
    #c0a040 100%
  );
  border: 0.5px solid #7a5818;
  box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 0.5px 1px rgba(255,240,180,0.25);
}

/* ── Animations ─────────────────────────────────────────── */
@keyframes jingle-rattle {
  0%,100% { transform: rotate(0deg) scaleY(1); }
  15%     { transform: rotate(-18deg) scaleY(0.95); }
  35%     { transform: rotate(14deg) scaleY(0.97); }
  55%     { transform: rotate(-12deg) scaleY(0.96); }
  75%     { transform: rotate(9deg) scaleY(0.98); }
}

.jingle-slot.rattling {
  animation: jingle-rattle 0.14s ease-in-out;
}

@keyframes tb-bounce {
  0%,100% { transform: scale(1) rotate(0deg); }
  20%     { transform: scale(1.012) rotate(-1.5deg); }
  45%     { transform: scale(1.015) rotate(1.8deg); }
  65%     { transform: scale(1.01) rotate(-1.2deg); }
  82%     { transform: scale(1.008) rotate(0.8deg); }
}

@keyframes membrane-flash {
  0%,100% { filter: brightness(1) saturate(1); }
  25%     { filter: brightness(1.45) saturate(1.1); }
}

#membrane.flashing {
  animation: membrane-flash 0.18s ease-out;
}

/* ── Word display ────────────────────────────────────────── */
#word-display {
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  flex-shrink: 0;
  width: 100%;
}

.word-wrap {
  display: inline-flex;
  gap: 0.05em;
}

.word-char {
  display: inline-block;
  font-weight: 900;
  font-size: clamp(30px, 9vw, 52px);
  letter-spacing: 0.05em;
}

.word-tan .word-char {
  color: var(--accent-tan);
  text-shadow:
    0 0 18px rgba(255,200,60,0.7),
    0 0 40px rgba(255,160,0,0.35);
  animation: char-pop 0.45s cubic-bezier(0.2,1.4,0.5,1) both;
}

.word-shaka .word-char {
  color: var(--accent-shaka);
  text-shadow:
    0 0 16px rgba(100,200,255,0.7),
    0 0 36px rgba(60,160,255,0.3);
  animation: char-wave 0.5s cubic-bezier(0.2,1.4,0.5,1) both;
}

@keyframes char-pop {
  0%   { transform: scale(0.2) translateY(12px) rotate(-8deg); opacity: 0; }
  60%  { transform: scale(1.12) translateY(-2px) rotate(2deg); opacity: 1; }
  80%  { transform: scale(0.97) translateY(0) rotate(-1deg); opacity: 1; }
  100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 0.85; }
}

@keyframes char-wave {
  0%   { transform: scale(0.3) translateY(8px); opacity: 0; }
  55%  { transform: scale(1.1) translateY(-3px); opacity: 1; }
  100% { transform: scale(1) translateY(0); opacity: 0.85; }
}

.word-fade-out {
  animation: fade-out 0.3s ease-in forwards !important;
}

@keyframes fade-out {
  0%   { opacity: 0.85; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-8px) scale(0.9); }
}

/* ── Controls ────────────────────────────────────────────── */
#controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  opacity: 0.55;
  transition: opacity 0.3s;
}

#controls:hover, #controls:focus-within {
  opacity: 0.85;
}

#controls label {
  font-size: 10px;
  color: var(--text);
  letter-spacing: 0.12em;
  white-space: nowrap;
}

#sens-slider {
  -webkit-appearance: none;
  width: 110px; height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.18);
  outline: none;
  touch-action: auto;
}

#sens-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 15px; height: 15px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
  box-shadow: 0 0 6px rgba(212,168,60,0.5);
}

#sens-slider::-moz-range-thumb {
  width: 15px; height: 15px;
  border-radius: 50%;
  background: var(--gold);
  border: none;
  cursor: pointer;
}

#sens-val {
  font-size: 10px;
  color: var(--gold);
  min-width: 10px;
  text-align: right;
}

/* ── Permission overlay ─────────────────────────────────── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,4,2,0.96);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  z-index: 200;
  padding: 24px;
}

#overlay .icon {
  font-size: 72px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%      { transform: translateY(-8px) rotate(3deg); }
}

#overlay p {
  color: var(--text);
  font-size: 15px;
  line-height: 1.9;
  text-align: center;
  opacity: 0.8;
  max-width: 280px;
}

#overlay small {
  font-size: 11px;
  color: var(--gold);
  opacity: 0.6;
  text-align: center;
}

#start-btn {
  background: linear-gradient(135deg, #e0b040, #c09020);
  color: #1a0a04;
  border: none;
  padding: 15px 44px;
  border-radius: 50px;
  font-size: 17px;
  font-weight: 900;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.12em;
  box-shadow:
    0 6px 28px rgba(200,160,40,0.45),
    inset 0 1px 2px rgba(255,255,255,0.3);
  transition: transform 0.1s, box-shadow 0.1s;
}

#start-btn:active {
  transform: scale(0.96);
  box-shadow: 0 3px 14px rgba(200,160,40,0.35);
}

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Permission / Start overlay -->
<div id="overlay">
  <div class="icon">🥁</div>
  <p>タンバリンを演奏しよう！<br>振ると「シャカ」、タップすると「タン」</p>
  <button id="start-btn">▶ 開始する</button>
  <small>端末を傾けると立体的に動きます</small>
</div>

<header>
  <h1>🥁 Tambourine</h1>
  <div id="motion-status">センサー起動中…</div>
</header>

<div id="tb-wrapper">
  <div id="tb-inner">
    <div id="tambourine">
      <!-- Jingles injected by JS -->
      <div id="membrane"></div>
    </div>
  </div>
</div>

<div id="word-display"></div>

<div id="controls">
  <label for="sens-slider">感度</label>
  <input type="range" id="sens-slider" min="1" max="10" value="5" step="1">
  <span id="sens-val">5</span>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════════════ */
let actx = null;
let noiseBuffer = null;

function ensureAudio() {
  if (!actx) {
    actx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (actx.state === 'suspended') actx.resume();
  if (!noiseBuffer) {
    // 1.5 seconds of white noise
    const len = Math.ceil(actx.sampleRate * 1.5);
    noiseBuffer = actx.createBuffer(1, len, actx.sampleRate);
    const d = noiseBuffer.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
}

/**
 * マスターコンプレッサー（音量均一化・迫力UP）
 */
function getMaster() {
  if (!getMaster._node) {
    const comp = actx.createDynamicsCompressor();
    comp.threshold.value = -14;
    comp.knee.value      = 6;
    comp.ratio.value     = 4;
    comp.attack.value    = 0.002;
    comp.release.value   = 0.18;
    comp.connect(actx.destination);
    getMaster._node = comp;
  }
  return getMaster._node;
}

/**
 * 単発のジングル音
 * @param {number} vol    0–1
 * @param {number} pit    ピッチ倍率
 * @param {number} del    遅延秒
 * @param {boolean} heavy trueなら「ズカ」用低域強調
 */
function jingle(vol, pit, del, heavy) {
  const t   = actx.currentTime + del;
  const dst = getMaster();

  const partials = heavy
    ? [
        {f: 2800, a: 0.55, d: 0.32},
        {f: 4600, a: 0.42, d: 0.24},
        {f: 6200, a: 0.28, d: 0.18},
        {f: 1800, a: 0.40, d: 0.40},
        {f: 8000, a: 0.18, d: 0.13},
      ]
    : [
        {f: 7180, a: 0.42, d: 0.18},
        {f: 11200, a: 0.28, d: 0.12},
        {f: 8640, a: 0.22, d: 0.20},
        {f: 5200, a: 0.32, d: 0.26},
        {f: 3600, a: 0.25, d: 0.30},
      ];

  partials.forEach(({f, a, d}) => {
    const osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f * pit;
    const g = actx.createGain();
    g.gain.setValueAtTime(vol * a * 0.20, t);
    g.gain.exponentialRampToValueAtTime(0.00001, t + d);
    osc.connect(g); g.connect(dst);
    osc.start(t); osc.stop(t + d + 0.01);
  });

  // ノイズ成分
  const src = actx.createBufferSource();
  src.buffer = noiseBuffer;
  const offset = Math.random() * 0.8;

  const f1 = actx.createBiquadFilter();
  f1.type          = heavy ? 'bandpass' : 'highpass';
  f1.frequency.value = heavy ? 1400 * pit : 5000 * pit;
  f1.Q.value       = heavy ? 1.2 : 0.5;

  const f2 = actx.createBiquadFilter();
  f2.type = 'peaking';
  f2.frequency.value = heavy ? 2200 * pit : 8000 * pit;
  f2.gain.value = 9;

  const ng = actx.createGain();
  const nVol = heavy ? vol * 0.55 : vol * 0.28;
  const nDec = heavy ? 0.24       : 0.12;
  ng.gain.setValueAtTime(nVol, t);
  ng.gain.exponentialRampToValueAtTime(0.00001, t + nDec);

  src.connect(f1); f1.connect(f2); f2.connect(ng); ng.connect(dst);
  src.start(t, offset); src.stop(t + nDec + 0.01);

  // heavy時のサブ低域「ズ」成分
  if (heavy) {
    const sub = actx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(110 * pit, t);
    sub.frequency.exponentialRampToValueAtTime(52 * pit, t + 0.14);
    const sg = actx.createGain();
    sg.gain.setValueAtTime(vol * 0.30, t);
    sg.gain.exponentialRampToValueAtTime(0.00001, t + 0.16);
    sub.connect(sg); sg.connect(dst);
    sub.start(t); sub.stop(t + 0.17);
  }
}

/**
 * ドン！の胴鳴り（タップ用）
 */
function thud(vol) {
  const t   = actx.currentTime;
  const dst = getMaster();

  // サブ低域「ドン」核（深いピッチダウン）
  const sub = actx.createOscillator();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(160, t);
  sub.frequency.exponentialRampToValueAtTime(40, t + 0.22);
  const subG = actx.createGain();
  subG.gain.setValueAtTime(vol * 1.15, t);
  subG.gain.exponentialRampToValueAtTime(0.00001, t + 0.32);
  sub.connect(subG); subG.connect(dst);
  sub.start(t); sub.stop(t + 0.34);

  // 中域ボディ（皮の張り感）
  const body = actx.createOscillator();
  body.type = 'triangle';
  body.frequency.setValueAtTime(320, t);
  body.frequency.exponentialRampToValueAtTime(90, t + 0.14);
  const bodyG = actx.createGain();
  bodyG.gain.setValueAtTime(vol * 0.70, t);
  bodyG.gain.exponentialRampToValueAtTime(0.00001, t + 0.18);
  body.connect(bodyG); bodyG.connect(dst);
  body.start(t); body.stop(t + 0.20);

  // 打撃アタック（短いクリック）
  const click = actx.createOscillator();
  click.type = 'square';
  click.frequency.setValueAtTime(700, t);
  click.frequency.exponentialRampToValueAtTime(110, t + 0.012);
  const clickG = actx.createGain();
  clickG.gain.setValueAtTime(vol * 0.38, t);
  clickG.gain.exponentialRampToValueAtTime(0.00001, t + 0.014);
  click.connect(clickG); clickG.connect(dst);
  click.start(t); click.stop(t + 0.016);

  // 皮ノイズ（低域のみ）
  const src = actx.createBufferSource();
  src.buffer = noiseBuffer;
  const lpf = actx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 1600;
  lpf.Q.value = 0.7;
  const noiseG = actx.createGain();
  noiseG.gain.setValueAtTime(vol * 0.32, t);
  noiseG.gain.exponentialRampToValueAtTime(0.00001, t + 0.12);
  src.connect(lpf); lpf.connect(noiseG); noiseG.connect(dst);
  src.start(t, Math.random() * 0.5); src.stop(t + 0.13);
}

/**
 * ドン＋ジングル（タップ）
 */
function playTap() {
  ensureAudio();
  thud(0.92);
  for (let i = 0; i < 6; i++) {
    jingle(0.55 - i * 0.07, 0.92 + Math.random() * 0.12, i * 0.018, true);
  }
}

/* playShake は物理エンジンに置き換えられました */

/* ═══════════════════════════════════════════════════
   BUILD TAMBOURINE JINGLES
═══════════════════════════════════════════════════ */
const tambourine = document.getElementById('tambourine');
const membrane   = document.getElementById('membrane');

const NUM_JINGLES = 8;
const jingleGroups = [];

(function buildJingles() {
  for (let i = 0; i < NUM_JINGLES; i++) {
    const angle = (i / NUM_JINGLES) * 360;
    const rad   = (angle - 90) * Math.PI / 180;
    // Position at ~83% of diameter from center
    const dist  = 41.2; // percent from center
    const x = 50 + dist * Math.sin(rad);
    const y = 50 - dist * Math.cos(rad);

    const group = document.createElement('div');
    group.className = 'jingle-group';
    group.style.cssText = `
      left: ${x.toFixed(2)}%;
      top:  ${y.toFixed(2)}%;
      transform: translate(-50%,-50%) rotate(${angle.toFixed(1)}deg);
    `;

    const slot = document.createElement('div');
    slot.className = 'jingle-slot';
    slot.innerHTML = '<div class="jingle-disc"></div><div class="jingle-disc"></div>';

    group.appendChild(slot);
    tambourine.insertBefore(group, membrane);
    jingleGroups.push({ group, slot });
  }
})();

/* ═══════════════════════════════════════════════════
   JINGLE PHYSICS STATE
   各ジングルを独立した振り子としてモデル化。
   リム上の角度ごとに加速度の射影が異なるので、
   方向によって鳴るジングルが変わる。
═══════════════════════════════════════════════════ */
const PHY = {
  THETA_MAX:   0.32,  // スロット壁の角度（rad）
  RESTITUTION: 0.28,  // 衝突後の速度保持率
  DAMPING:     6.0,   // 減衰係数（大きいほど早く止まる）
  DRIVE:       48,    // 加速度→角加速度の倍率
  MIN_HIT_VEL: 1.4,   // 音が鳴る最小衝突速度
  HIT_COOL:    22,    // 同一ジングルの連続発音クールダウン(ms)
  GRAV_RESTORE:10,    // 重力による復元力の強さ
};

// 感度スライダーの値でDRIVEをスケール
function getDriveScale() {
  const s = parseInt(document.getElementById('sens-slider').value);
  return PHY.DRIVE * (0.5 + s * 0.1); // sens1→0.6x, sens10→1.5x
}

const jingleStates = jingleGroups.map((_, i) => ({
  theta:     0,          // 現在の振れ角(rad)
  omega:     0,          // 角速度(rad/s)
  rimAngle:  (i / NUM_JINGLES) * Math.PI * 2, // リム上の位置(rad, 0=上)
  lastHitMs: 0,          // 最後に音を鳴らした時刻
  pitchBase: 0.88 + (i / NUM_JINGLES) * 0.24, // 位置ごとの音程バリエーション
}));

// センサーから更新される線形加速度（重力除去済み）
let accLinear = { x: 0, y: 0, z: 0 };


const wordDisplay = document.getElementById('word-display');
let wordTimer = null;

function showWord(text, cls) {
  clearTimeout(wordTimer);
  // Build individual chars for stagger animation
  const wrap = document.createElement('div');
  wrap.className = `word-wrap ${cls}`;
  [...text].forEach((ch, idx) => {
    const span = document.createElement('span');
    span.className = 'word-char';
    span.textContent = ch;
    span.style.animationDelay = `${idx * 0.04}s`;
    wrap.appendChild(span);
  });
  wordDisplay.innerHTML = '';
  wordDisplay.appendChild(wrap);

  wordTimer = setTimeout(() => {
    const chars = wordDisplay.querySelectorAll('.word-char');
    chars.forEach((c, i) => {
      c.style.animationDelay = `${i * 0.03}s`;
      c.classList.add('word-fade-out');
    });
    setTimeout(() => { wordDisplay.innerHTML = ''; }, 350);
  }, 480);
}

function createRipple(x, y) {
  const r  = document.createElement('div');
  const r2 = document.createElement('div');
  r.className  = 'ripple';
  r2.className = 'ripple-ring';
  r.style.left = r2.style.left = x + 'px';
  r.style.top  = r2.style.top  = y + 'px';
  membrane.appendChild(r);
  membrane.appendChild(r2);
  r.addEventListener('animationend',  () => r.remove());
  r2.addEventListener('animationend', () => r2.remove());
}

function triggerTapViz(cx, cy) {
  createRipple(cx, cy);
  membrane.classList.remove('flashing');
  void membrane.offsetWidth; // reflow
  membrane.classList.add('flashing');
  membrane.addEventListener('animationend', () => membrane.classList.remove('flashing'), { once: true });
  // Rattle nearby jingles
  jingleGroups.forEach(({ slot }, i) => {
    setTimeout(() => {
      slot.classList.remove('rattling');
      void slot.offsetWidth;
      slot.classList.add('rattling');
      slot.addEventListener('animationend', () => slot.classList.remove('rattling'), { once: true });
    }, i * 12);
  });
}

function triggerTambourineBounce() {
  tambourine.style.animation = 'none';
  void tambourine.offsetWidth;
  tambourine.style.animation = 'tb-bounce 0.16s ease-in-out';
  tambourine.addEventListener('animationend', () => { tambourine.style.animation = ''; }, { once: true });
}

/* ── 単一ジングル衝突処理 ─────────────────────────────── */
function onJingleHit(idx, impactOmega) {
  const s = jingleStates[idx];
  const nowMs = performance.now();
  if (nowMs - s.lastHitMs < PHY.HIT_COOL) return;
  s.lastHitMs = nowMs;

  const intensity = Math.min(1, (Math.abs(impactOmega) - PHY.MIN_HIT_VEL) / 14);
  const vol = 0.18 + intensity * 0.52;
  const pit = s.pitchBase * (0.96 + Math.random() * 0.08);
  jingle(vol, pit, 0, true);

  // ジングルvisual（CSSアニメは物理に任せるのでクラスは使わない）
  // 衝突の強さに応じた軽いフラッシュ
  const slot = jingleGroups[idx].slot;
  slot.style.filter = `brightness(${1.2 + intensity * 0.5})`;
  setTimeout(() => { slot.style.filter = ''; }, 60);
}

/* ── 物理ループ（rAF駆動） ───────────────────────────────
   各ジングルを振り子方程式で積分し、スロット壁衝突で発音。
   dt は前フレームからの経過時間（40ms上限でキャップ）。
   ─────────────────────────────────────────────────────── */
let _lastPhysTime = null;
let _totalKE      = 0;   // 全ジングルの運動エネルギー合計
let _lastWordMs   = 0;

function physicsFrame(now) {
  if (!_lastPhysTime) _lastPhysTime = now;
  const dt = Math.min((now - _lastPhysTime) / 1000, 0.040);
  _lastPhysTime = now;

  const drive = getDriveScale();
  const { x: ax, y: ay } = accLinear;
  // 重力ベクトル（傾き検出用、gravLP から）
  const gx = gravLP.x, gy = gravLP.y;
  const gMag = Math.sqrt(gx * gx + gy * gy) || 9.8;

  _totalKE = 0;

  jingleStates.forEach((s, i) => {
    const { rimAngle } = s;

    // リム接線方向への加速度射影
    // rimAngle=0 → 上端, π/2 → 右端
    // 接線ベクトル: (cos α, sin α) [x右, y下]
    // iOS: y軸は上が正なので符号反転
    const tangX =  Math.cos(rimAngle);
    const tangY =  Math.sin(rimAngle);
    const aTang = ax * tangX - ay * tangY; // y軸反転

    // 重力による復元力（振り子の「下へ戻ろうとする」力）
    // 実際の重力方向への θ の依存分
    const gTang = gx * tangX - gy * tangY;
    const gRestore = (gTang / gMag) * PHY.GRAV_RESTORE * s.theta;

    // 運動方程式: θ'' = -drive * a_tang - g_restore - damping * θ'
    const alpha = -drive * aTang - gRestore - PHY.DAMPING * s.omega;

    s.omega += alpha * dt;
    s.theta += s.omega * dt;

    // ── 壁衝突 ─────────────────────────────────
    if (Math.abs(s.theta) >= PHY.THETA_MAX) {
      const sign = Math.sign(s.theta);
      s.theta = sign * PHY.THETA_MAX;

      if (Math.abs(s.omega) > PHY.MIN_HIT_VEL) {
        onJingleHit(i, s.omega);
      }
      // バウンス
      s.omega = -s.omega * PHY.RESTITUTION;
    }

    // ── ビジュアル：slot を θ に合わせて傾ける ──
    const deg = s.theta * (180 / Math.PI) * 0.85;
    jingleGroups[i].slot.style.transform = `rotate(${deg.toFixed(2)}deg)`;

    _totalKE += 0.5 * s.omega * s.omega;
  });

  // ── 全体の揺れ感（運動エネルギー合計が大きいときバウンス）
  const avgKE = _totalKE / NUM_JINGLES;
  if (avgKE > 12) {
    const nowD = Date.now();
    if (nowD - _lastWordMs > 320) {
      _lastWordMs = nowD;
      triggerTambourineBounce();
      const intensity = Math.min(1, avgKE / 50);
      const rep = intensity < 0.35 ? 1 : intensity < 0.7 ? 2 : 3;
      showWord('ズカ'.repeat(rep) + (intensity > 0.65 ? '！' : ''), 'word-shaka');
    }
  }

  requestAnimationFrame(physicsFrame);
}

/* ═══════════════════════════════════════════════════
   TAP INTERACTION
═══════════════════════════════════════════════════ */
let lastTapMs = 0;

function handleTap(e) {
  const now = Date.now();
  if (now - lastTapMs < 70) return;
  lastTapMs = now;

  const rect = membrane.getBoundingClientRect();
  let cx, cy;
  if (e.changedTouches) {
    cx = e.changedTouches[0].clientX - rect.left;
    cy = e.changedTouches[0].clientY - rect.top;
  } else {
    cx = e.clientX - rect.left;
    cy = e.clientY - rect.top;
  }

  playTap();
  triggerTapViz(cx, cy);
  showWord('タン！', 'word-tan');
}

membrane.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); }, { passive: false });
membrane.addEventListener('mousedown',  handleTap);

/* ═══════════════════════════════════════════════════
   DEVICE MOTION → 物理エンジンへの入力
   センサー値は accLinear に書き込むだけ。
   実際の発音・ビジュアルは physicsFrame が担当。
═══════════════════════════════════════════════════ */
const motionStatus = document.getElementById('motion-status');
const tbInner = document.getElementById('tb-inner');

// 重力成分（傾き検出用 低パスフィルター）
let gravLP = { x: 0, y: 0, z: -9.8 };
const LP_ALPHA = 0.10;

// 線形加速度のさらに軽いノイズ除去（高周波ノイズを少し平滑化）
let accSmooth = { x: 0, y: 0, z: 0 };
const ACC_ALPHA = 0.7; // 速い変化に追従

let motionActive = false;

function onMotion(e) {
  const raw  = e.accelerationIncludingGravity;
  const pure = e.acceleration;
  if (!raw) return;

  const rx = raw.x || 0, ry = raw.y || 0, rz = raw.z || 0;

  // ── 重力推定（超低パス）─────────────────────────
  gravLP.x += LP_ALPHA * (rx - gravLP.x);
  gravLP.y += LP_ALPHA * (ry - gravLP.y);
  gravLP.z += LP_ALPHA * (rz - gravLP.z);

  // ── 傾きによる3D回転ビジュアル ──────────────────
  const tiltX = Math.max(-1, Math.min(1, gravLP.y / 9.8));
  const tiltY = Math.max(-1, Math.min(1, gravLP.x / 9.8));
  tbInner.style.transform =
    `perspective(500px) rotateX(${(-tiltX * 14).toFixed(2)}deg) rotateY(${(tiltY * 14).toFixed(2)}deg)`;

  // ── 線形加速度（重力除去）→ 物理エンジンへ ──────
  let ax, ay, az;
  if (pure && pure.x != null) {
    ax = pure.x || 0; ay = pure.y || 0; az = pure.z || 0;
  } else {
    ax = rx - gravLP.x; ay = ry - gravLP.y; az = rz - gravLP.z;
  }

  // 軽いローパスでノイズ除去
  accSmooth.x += ACC_ALPHA * (ax - accSmooth.x);
  accSmooth.y += ACC_ALPHA * (ay - accSmooth.y);
  accSmooth.z += ACC_ALPHA * (az - accSmooth.z);

  // 物理ループが参照するグローバル変数に書き込む
  accLinear.x = accSmooth.x;
  accLinear.y = accSmooth.y;
  accLinear.z = accSmooth.z;
}

function startMotion() {
  // 物理ループを開始
  requestAnimationFrame(physicsFrame);

  if (typeof DeviceMotionEvent !== 'undefined') {
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            window.addEventListener('devicemotion', onMotion);
            motionStatus.textContent = '✅ センサー有効 · 振って鳴らそう！';
            motionActive = true;
          } else {
            motionStatus.textContent = '❌ センサー権限なし · タップで演奏';
          }
        })
        .catch(() => {
          motionStatus.textContent = '⚠ センサーエラー · タップで演奏';
        });
    } else {
      window.addEventListener('devicemotion', onMotion);
      let checkTimer = setTimeout(() => {
        motionStatus.textContent = '💻 デスクトップモード · クリックで演奏';
      }, 1200);
      window.addEventListener('devicemotion', () => {
        clearTimeout(checkTimer);
        if (!motionActive) {
          motionActive = true;
          motionStatus.textContent = '✅ センサー有効 · 振って鳴らそう！';
        }
      }, { once: true });
    }
  } else {
    motionStatus.textContent = '💻 デスクトップモード · クリックで演奏';
  }
}

/* ═══════════════════════════════════════════════════
   SENSITIVITY SLIDER
═══════════════════════════════════════════════════ */
const slider  = document.getElementById('sens-slider');
const sensVal = document.getElementById('sens-val');
slider.addEventListener('input', () => {
  sensVal.textContent = slider.value;
}, { passive: true });
// Allow slider touch without triggering tambourine
slider.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
slider.addEventListener('touchmove',  e => e.stopPropagation(), { passive: true });

/* ═══════════════════════════════════════════════════
   START / PERMISSION OVERLAY
═══════════════════════════════════════════════════ */
const overlay  = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');

function doStart() {
  ensureAudio();
  startMotion();
  overlay.classList.add('hidden');
}

startBtn.addEventListener('click', doStart);
startBtn.addEventListener('touchend', e => { e.preventDefault(); doStart(); });

// On desktop: any click outside overlay also starts
document.addEventListener('click', () => {
  if (!overlay.classList.contains('hidden')) return;
  if (!actx) ensureAudio();
}, { once: true });
</script>
